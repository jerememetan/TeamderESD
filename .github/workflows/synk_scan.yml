name: Snyk scan for student-service
on:
  push:
    branches: [ main ]
jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Build student-service Docker image
        run: |
          docker build -f backend/atomic-services/student/Dockerfile -t jeremetan/student-service backend/atomic-services/student

      - name: Run Snyk to check Docker image for vulnerabilities
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: jeremetan/student-service
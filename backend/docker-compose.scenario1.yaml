services:

  # Atomic

  student-service:
    build:
      context: ./atomic-services/student
    container_name: teamder-student-service
    environment:
      ENABLE_SWAGGER: "true"
      PORT: 3001
      OUTSYSTEMS_BASE_URL: https://personal-0wtj3pne.outsystemscloud.com/Student/rest/Student
    ports:
      - "3001:3001"

  course-service:
    build:
      context: ./atomic-services/course
    container_name: teamder-course-service
    environment:
      ENABLE_SWAGGER: "true"
      PORT: 3017
      OUTSYSTEMS_BASE_URL: https://personal-0wtj3pne.outsystemscloud.com/Course/rest/Course
    ports:
      - "3017:3017"

  section-service:
    build:
      context: ./atomic-services/section
    container_name: teamder-section-service
    environment:
      ENABLE_SWAGGER: "true"
      PORT: 3018
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3018:3018"

  skill-service:
    build:
      context: ./atomic-services/skill
    container_name: teamder-skill-service
    environment:
      ENABLE_SWAGGER: "true"
      PORT: 3002
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3002:3002"

  topic-service:
    build:
      context: ./atomic-services/project-topic
    container_name: teamder-project-topic-service
    environment:
      ENABLE_SWAGGER: "true"
      PORT: 3003
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3003:3003"

  criteria-service:
    build:
      context: ./atomic-services/criteria
    container_name: teamder-criteria-service
    environment:
      ENABLE_SWAGGER: "true"
      PORT: 3004
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3004:3004"

  enrollment-service:
    build:
      context: ./atomic-services/enrollment
    container_name: teamder-enrollment-service
    environment:
      ENABLE_SWAGGER: "true"
      PORT: 3005
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3005:3005"

  reputation-service:
    build:
      context: ./atomic-services/reputation
    container_name: teamder-reputation-service
    environment:
      ENABLE_SWAGGER: "true"
      PORT: 3006
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3006:3006"
  
  team-service:
    build:
      context: ./atomic-services/team
    container_name: teamder-team-service
    environment:
      ENABLE_SWAGGER: "true"
      PORT: 3007
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3007:3007"

  student-competence-service:
    build: ./atomic-services/student-competence
    container_name: teamder-student-competence-service
    environment:
      ENABLE_SWAGGER: "true"
      PORT: 3008
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3008:3008"
  
  student-topic-preference-service:
    build: ./atomic-services/student-topic-preference
    container_name: teamder-student-topic-preference-service
    environment:
      ENABLE_SWAGGER: "true"
      PORT: 3009
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3009:3009"

  student-form-data-service:
    build: ./atomic-services/student-form-data
    container_name: teamder-student-form-data-service
    environment:
      ENABLE_SWAGGER: "true"
      PORT: 3010
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3010:3010"

  student-form-service:
    build: ./atomic-services/student-form
    container_name: teamder-student-form-service
    environment:
      ENABLE_SWAGGER: "true"
      PORT: 3015
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3015:3015"

  notification-service:
    build: ./atomic-services/notification
    container_name: teamder-notification-service
    environment:
      ENABLE_SWAGGER: "true"
      PORT: 3016
      RABBIT_HOST: rabbitmq
      RABBIT_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      NOTIFICATION_EXCHANGE: notification.topic
      NOTIFICATION_EXCHANGE_TYPE: topic
      NOTIFICATION_ROUTING_KEY: notification.email
      NOTIFICATION_EMAIL_QUEUE: notification.email.queue
      GMAIL_SMTP_HOST: smtp.gmail.com
      GMAIL_SMTP_PORT: 587
      GMAIL_SMTP_USER: ${GMAIL_SMTP_USER}
      GMAIL_SMTP_PASSWORD: ${GMAIL_SMTP_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_SEND_MAX_RETRIES: ${EMAIL_SEND_MAX_RETRIES:-3}
      EMAIL_SEND_RETRY_BACKOFF_SECONDS: ${EMAIL_SEND_RETRY_BACKOFF_SECONDS:-2}
      EMAIL_SEND_DELAY_SECONDS: ${EMAIL_SEND_DELAY_SECONDS:-0}
      NOTIFICATION_CONSUMER_PREFETCH: ${NOTIFICATION_CONSUMER_PREFETCH:-5}
      NOTIFICATION_ERROR_EXCHANGE: ${NOTIFICATION_ERROR_EXCHANGE:-notification.topic}
      NOTIFICATION_ERROR_ROUTING_KEY: ${NOTIFICATION_ERROR_ROUTING_KEY:-notification.email.error}
    ports:
      - "3016:3016"
    depends_on:
      rabbitmq:
        condition: service_healthy
      rabbitmq-setup:
        condition: service_healthy

  # Composite

  formation-config-service:
    build:
      context: ./composite-services/formation-config
    container_name: teamder-formation-config-service
    ports:
      - "4000:4000"
    environment:
      ENABLE_SWAGGER: "true"
      CRITERIA_URL: "http://criteria-service:3004/criteria"
      TOPIC_URL: "http://topic-service:3003/topic"
      SKILL_URL: "http://skill-service:3002/skill"
      SECTION_URL: "http://section-service:3018/section"
      FRONTEND_ORIGIN: "http://localhost:5173"
    depends_on:
      - criteria-service
      - topic-service
      - skill-service
      - section-service

  student-profile-service:
    build:
      context: ./composite-services/student-profile
    container_name: teamder-student-profile-service
    ports:
      - "4001:4001"
    environment:
      ENABLE_SWAGGER: "true"
      OUTSYSTEMS_BASE_URL: "https://personal-0wtj3pne.outsystemscloud.com/Student/rest/Student"
      ENROLLMENT_URL: "http://enrollment-service:3005/enrollment"
      FORM_DATA_URL: "http://student-form-data-service:3010/form-data"
      REPUTATION_URL: "http://reputation-service:3006/reputation"
      TOPIC_PREFERENCE_URL: "http://student-topic-preference-service:3009/topic-preference"
      COMPETENCE_URL: "http://student-competence-service:3008/competence"
      FRONTEND_ORIGIN: "http://localhost:5173"
    depends_on:
      - enrollment-service
      - student-form-data-service
      - student-topic-preference-service
      - reputation-service
      - student-competence-service

  team-formation-service:
    build:
      context: ./composite-services/team-formation
    container_name: teamder-team-formation-service
    ports:
      - "4002:4002"
    environment:
      ENABLE_SWAGGER: "true"
      STUDENT_PROFILE_URL: "http://student-profile-service:4001/student-profile"
      FORMATION_CONFIG_URL: "http://formation-config-service:4000/formation-config"
      STUDENT_FORM_URL: "http://student-form-service:3015/student-form"
      REPUTATION_URL: "http://reputation-service:3006/reputation"
      TEAM_URL: "http://team-service:3007/team"
      SECTION_URL: "http://section-service:3018/section"
      REQUEST_TIMEOUT: 8
      PORT: 4002
      FRONTEND_ORIGIN: "http://localhost:5173"
    depends_on:
      - student-profile-service
      - formation-config-service
      - student-form-service
      - reputation-service
      - team-service

  formation-notification-service:
    build:
      context: ./composite-services/formation-notification
    container_name: teamder-formation-notification-service
    ports:
      - "4004:4004"
    environment:
      ENABLE_SWAGGER: "true"
      ENROLLMENT_URL: "http://enrollment-service:3005/enrollment"
      STUDENT_FORM_URL: "http://student-form-service:3015/student-form"
      STUDENT_SERVICE_URL: "http://student-service:3001/api/students"
      SECTION_URL: "http://section-service:3018/section"
      FORM_LINK_URL_TEMPLATE: "http://localhost:5173/student/{student_id}/form/{form_id}"
      FORM_LINK_SUBJECT: "Action Required: Complete Your Teamder Student Form"
      FORM_LINK_GENERIC_MESSAGE: "Please complete your Teamder student form using the link provided."
      FORM_LINK_TEMPLATE_KEY: "student_form_link_v1"
      RABBITMQ_HOST: "rabbitmq"
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: "guest"
      RABBITMQ_PASSWORD: "guest"
      RABBITMQ_VHOST: "/"
      NOTIFICATION_EXCHANGE: "notification.topic"
      NOTIFICATION_EXCHANGE_TYPE: "topic"
      NOTIFICATION_ROUTING_KEY: "notification.email"
      REQUEST_TIMEOUT: 10
      PORT: 4004
    depends_on:
      - enrollment-service
      - section-service
      - student-form-service
      - student-service
      - rabbitmq

  docs-index-service:
    build:
      context: ./docs/swagger-index
    container_name: teamder-docs-index-service
    ports:
      - "4010:4010"
    environment:
      PORT: 4010

# RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management
    container_name: teamder-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s


  rabbitmq-setup:
    image: python:3.12-slim
    container_name: teamder-rabbitmq-setup
    restart: unless-stopped
    working_dir: /app
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
    volumes:
      - ./rabbitmq:/app:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
    command: >
      sh -c "
      pip install --no-cache-dir -r /app/requirements.txt &&
      last_hash='' &&
      while true; do
        current_hash=$$(sha256sum /app/amqpsetup.py /app/requirements.txt | sha256sum | awk '{print $$1}') &&
        if [ \"$$current_hash\" != \"$$last_hash\" ]; then
          echo 'Applying RabbitMQ topology from /app/amqpsetup.py...' &&
          python /app/amqpsetup.py &&
          last_hash=\"$$current_hash\" &&
          touch /tmp/rabbitmq-setup.ready;
        fi;
        sleep 10;
      done
      "
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/rabbitmq-setup.ready"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s


volumes:
  rabbitmq_data:










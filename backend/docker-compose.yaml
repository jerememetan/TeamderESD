services:
  # Atomic

  # Note: `student-service` and `course-service` wrappers removed from this compose
  # They are replaced by routing through the Kong gateway to the OutSystems APIs.

  section-service:
    build:
      context: ./atomic-services/section
    container_name: teamder-section-service
    environment:
      ENABLE_SWAGGER: "true"
      PORT: 3018
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3018:3018"

  skill-service:
    build:
      context: ./atomic-services/skill
    container_name: teamder-skill-service
    environment:
      ENABLE_SWAGGER: "true"
      PORT: 3002
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3002:3002"

  error-service:
    build: ./atomic-services/error
    container_name: teamder-error-service
    environment:
      ENABLE_SWAGGER: "true"
      PORT: 3019
      SUPABASE_URL: ${SUPABASE_URL}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      ERROR_EXCHANGE_NAME: ${ERROR_EXCHANGE_NAME:-notification.topic}
      ERROR_EXCHANGE_TYPE: ${ERROR_EXCHANGE_TYPE:-topic}
      ERROR_QUEUE_NAME: ${ERROR_QUEUE_NAME:-error.error-log.queue}
      ERROR_ROUTING_KEYS: ${ERROR_ROUTING_KEYS:-#.error}
      ERROR_CONSUMER_ENABLED: ${ERROR_CONSUMER_ENABLED:-true}
      ERROR_CONSUMER_PREFETCH: ${ERROR_CONSUMER_PREFETCH:-10}
      ERROR_CONSUMER_RETRY_SECONDS: ${ERROR_CONSUMER_RETRY_SECONDS:-3}
    ports:
      - "3019:3019"
    depends_on:
      rabbitmq:
        condition: service_healthy
      rabbitmq-setup:
        condition: service_healthy
  topic-service:
    build:
      context: ./atomic-services/project-topic
    container_name: teamder-project-topic-service
    environment:
      ENABLE_SWAGGER: "true"
      PORT: 3003
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3003:3003"

  criteria-service:
    build:
      context: ./atomic-services/criteria
    container_name: teamder-criteria-service
    environment:
      ENABLE_SWAGGER: "true"
      PORT: 3004
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3004:3004"

  enrollment-service:
    build:
      context: ./atomic-services/enrollment
    container_name: teamder-enrollment-service
    environment:
      ENABLE_SWAGGER: "true"
      PORT: 3005
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3005:3005"

  reputation-service:
    build:
      context: ./atomic-services/reputation
    container_name: teamder-reputation-service
    environment:
      ENABLE_SWAGGER: "true"
      PORT: 3006
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3006:3006"

  team-service:
    build:
      context: ./atomic-services/team
    container_name: teamder-team-service
    environment:
      ENABLE_SWAGGER: "true"
      PORT: 3007
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3007:3007"

  student-competence-service:
    build: ./atomic-services/student-competence
    container_name: teamder-student-competence-service
    environment:
      ENABLE_SWAGGER: "true"
      PORT: 3008
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3008:3008"

  student-topic-preference-service:
    build: ./atomic-services/student-topic-preference
    container_name: teamder-student-topic-preference-service
    environment:
      ENABLE_SWAGGER: "true"
      PORT: 3009
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3009:3009"

  student-form-data-service:
    build: ./atomic-services/student-form-data
    container_name: teamder-student-form-data-service
    environment:
      ENABLE_SWAGGER: "true"
      PORT: 3010
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3010:3010"

  student-form-service:
    build: ./atomic-services/student-form
    container_name: teamder-student-form-service
    environment:
      ENABLE_SWAGGER: "true"
      PORT: 3015
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3015:3015"
  swap-request-service:
    build:
      context: ./atomic-services/swap-request
    container_name: teamder-swap-request-service
    env_file:
      - ./scenario3.env
    environment:
      ENABLE_SWAGGER: "true"
      PORT: 3011
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3011:3011"
    depends_on:
      rabbitmq:
        condition: service_healthy
      rabbitmq-setup:
        condition: service_healthy

  notification-service:
    build: ./atomic-services/notification
    container_name: teamder-notification-service
    environment:
      ENABLE_SWAGGER: "true"
      PORT: 3016
      RABBIT_HOST: rabbitmq
      RABBIT_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      NOTIFICATION_EXCHANGE: notification.topic
      NOTIFICATION_EXCHANGE_TYPE: topic
      NOTIFICATION_ROUTING_KEY: notification.email
      NOTIFICATION_EMAIL_QUEUE: notification.email.queue
      GMAIL_SMTP_HOST: smtp.gmail.com
      GMAIL_SMTP_PORT: 587
      GMAIL_SMTP_USER: ${GMAIL_SMTP_USER}
      GMAIL_SMTP_PASSWORD: ${GMAIL_SMTP_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_SEND_MAX_RETRIES: ${EMAIL_SEND_MAX_RETRIES:-3}
      EMAIL_SEND_RETRY_BACKOFF_SECONDS: ${EMAIL_SEND_RETRY_BACKOFF_SECONDS:-2}
      EMAIL_SEND_DELAY_SECONDS: ${EMAIL_SEND_DELAY_SECONDS:-0}
      NOTIFICATION_CONSUMER_PREFETCH: ${NOTIFICATION_CONSUMER_PREFETCH:-5}
      NOTIFICATION_CONSUMER_DEAD_LETTER_EXCHANGE: ${NOTIFICATION_CONSUMER_DEAD_LETTER_EXCHANGE:-notification.topic}
      NOTIFICATION_CONSUMER_DEAD_LETTER_ROUTING_KEY: ${NOTIFICATION_CONSUMER_DEAD_LETTER_ROUTING_KEY:-notification.email.error}
      NOTIFICATION_ERROR_EXCHANGE: ${NOTIFICATION_ERROR_EXCHANGE:-notification.topic}
      NOTIFICATION_ERROR_ROUTING_KEY: ${NOTIFICATION_ERROR_ROUTING_KEY:-notification.email.error}

    ports:
      - "3016:3016"
    depends_on:
      rabbitmq:
        condition: service_healthy
      rabbitmq-setup:
        condition: service_healthy

  # Composite

  formation-config-service:
    build:
      context: ./composite-services/formation-config
    container_name: teamder-formation-config-service
    ports:
      - "4000:4000"
    environment:
      ENABLE_SWAGGER: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      ERROR_EXCHANGE_NAME: ${ERROR_EXCHANGE_NAME:-notification.topic}
      ERROR_EXCHANGE_TYPE: ${ERROR_EXCHANGE_TYPE:-topic}
      ERROR_ROUTING_KEY_PREFIX: ${ERROR_ROUTING_KEY_PREFIX:-}
      CRITERIA_URL: "http://criteria-service:3004/criteria"
      TOPIC_URL: "http://topic-service:3003/topic"
      SKILL_URL: "http://skill-service:3002/skill"
    depends_on:
      - criteria-service
      - topic-service
      - skill-service

  student-profile-service:
    build:
      context: ./composite-services/student-profile
    container_name: teamder-student-profile-service
    ports:
      - "4001:4001"
    environment:
      ENABLE_SWAGGER: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      ERROR_EXCHANGE_NAME: ${ERROR_EXCHANGE_NAME:-notification.topic}
      ERROR_EXCHANGE_TYPE: ${ERROR_EXCHANGE_TYPE:-topic}
      ERROR_ROUTING_KEY_PREFIX: ${ERROR_ROUTING_KEY_PREFIX:-}
      OUTSYSTEMS_BASE_URL: "https://personal-0wtj3pne.outsystemscloud.com/Student/rest/Student"
      ENROLLMENT_URL: "http://enrollment-service:3005/enrollment"
      FORM_DATA_URL: "http://student-form-data-service:3010/form-data"
      STUDENT_FORM_SUBMISSION_URL: "http://student-form-submission-service:4006/student-form-submission/submit"
      REPUTATION_URL: "http://reputation-service:3006/reputation"
      TOPIC_PREFERENCE_URL: "http://student-topic-preference-service:3009/topic-preference"
      COMPETENCE_URL: "http://student-competence-service:3008/competence"
    depends_on:
      - enrollment-service
      - student-form-data-service
      - student-form-service
      - student-topic-preference-service
      - reputation-service
      - student-competence-service

  student-form-submission-service:
    build:
      context: ./composite-services/student-form-submission
    container_name: teamder-student-form-submission-service
    ports:
      - "4006:4006"
    environment:
      ENABLE_SWAGGER: "true"
      PORT: 4006
      REQUEST_TIMEOUT: 8
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      ERROR_EXCHANGE_NAME: ${ERROR_EXCHANGE_NAME:-notification.topic}
      ERROR_EXCHANGE_TYPE: ${ERROR_EXCHANGE_TYPE:-topic}
      ERROR_ROUTING_KEY_PREFIX: ${ERROR_ROUTING_KEY_PREFIX:-}
      FORM_DATA_URL: "http://student-form-data-service:3010/form-data"
      COMPETENCE_URL: "http://student-competence-service:3008/competence"
      TOPIC_PREFERENCE_URL: "http://student-topic-preference-service:3009/topic-preference"
      STUDENT_FORM_URL: "http://student-form-service:3015/student-form"
    depends_on:
      - student-form-data-service
      - student-competence-service
      - student-topic-preference-service
      - student-form-service
  team-formation-service:
    build:
      context: ./composite-services/team-formation
    container_name: teamder-team-formation-service
    ports:
      - "4002:4002"
    environment:
      ENABLE_SWAGGER: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      ERROR_EXCHANGE_NAME: ${ERROR_EXCHANGE_NAME:-notification.topic}
      ERROR_EXCHANGE_TYPE: ${ERROR_EXCHANGE_TYPE:-topic}
      ERROR_ROUTING_KEY_PREFIX: ${ERROR_ROUTING_KEY_PREFIX:-}
      STUDENT_PROFILE_URL: "http://student-profile-service:4001/student-profile"
      FORMATION_CONFIG_URL: "http://formation-config-service:4000/formation-config"
      STUDENT_FORM_URL: "http://student-form-service:3015/student-form"
      REPUTATION_URL: "http://reputation-service:3006/reputation"
      TEAM_URL: "http://team-service:3007/team"
      SECTION_URL: "http://section-service:3018/section"
      REQUEST_TIMEOUT: 8
      PORT: 4002
    depends_on:
      - student-profile-service
      - formation-config-service
      - student-form-service
      - reputation-service
      - team-service

  peer-evaluation-service:
    build:
      context: ./atomic-services/peer-evaluation
    container_name: teamder-peer-evaluation-service
    environment:
      PORT: 3020
      SUPABASE_URL: ${SUPABASE_URL}
      FRONTEND_ORIGIN: "http://localhost:5173"
    ports:
      - "3020:3020"

  dashboard-orchestrator-service:
    build:
      context: ./composite-services/dashboard-orchestrator
    container_name: teamder-dashboard-orchestrator-service
    ports:
      - "4003:4003"
    environment:
      ENABLE_SWAGGER: "true"
      TEAM_URL: "http://team-service:3007/team"
      STUDENT_PROFILE_URL: "http://student-profile-service:4001/student-profile"
      STUDENT_FORM_SUBMISSIONS_URL: "http://student-form-service:3015/student-form/submissions"
      FORMATION_CONFIG_URL: "http://formation-config-service:4000/formation-config"
      PEER_EVAL_URL: "http://peer-evaluation-service:3020/peer-eval"
      COURSES_URL: "https://personal-0wtj3pne.outsystemscloud.com/Course/rest/Course/course"
      REQUEST_TIMEOUT: 8
      PORT: 4003
    depends_on:
      - team-service
      - student-profile-service
      - student-form-service
      - formation-config-service

  peer-eval-notification-service:
    build:
      context: ./composite-services/peer-eval-notification
    container_name: teamder-peer-eval-notification-service
    ports:
      - "4008:4008"
    environment:
      ENABLE_SWAGGER: "true"
      PORT: 4008
      REQUEST_TIMEOUT: 8
      MAX_PARALLEL_WORKERS: 20
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      ERROR_EXCHANGE_NAME: ${ERROR_EXCHANGE_NAME:-notification.topic}
      ERROR_EXCHANGE_TYPE: ${ERROR_EXCHANGE_TYPE:-topic}
      ERROR_ROUTING_KEY_PREFIX: ${ERROR_ROUTING_KEY_PREFIX:-}
      NOTIFICATION_EXCHANGE: "notification.topic"
      NOTIFICATION_EXCHANGE_TYPE: "topic"
      NOTIFICATION_ROUTING_KEY: "notification.email"
      TEAM_URL: "http://team-service:3007/team"
      STUDENT_PROFILE_URL: "http://student-profile-service:4001/student-profile"
      STUDENT_SERVICE_URL: "https://personal-0wtj3pne.outsystemscloud.com/Student/rest/Student/student"
      PEER_EVAL_URL: "http://peer-evaluation-service:3020/peer-eval"
      REPUTATION_URL: "http://reputation-service:3006/reputation"
      SECTION_URL: "http://section-service:3018/section"
      FRONTEND_PEER_EVAL_URL: "http://localhost:5173/student/peer-evaluation"
    depends_on:
      - team-service
      - student-profile-service
      - peer-evaluation-service
      - reputation-service
      - rabbitmq

  formation-notification-service:
    build:
      context: ./composite-services/formation-notification
    container_name: teamder-formation-notification-service
    ports:
      - "4004:4004"
    environment:
      ENABLE_SWAGGER: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      ERROR_EXCHANGE_NAME: ${ERROR_EXCHANGE_NAME:-notification.topic}
      ERROR_EXCHANGE_TYPE: ${ERROR_EXCHANGE_TYPE:-topic}
      ERROR_ROUTING_KEY_PREFIX: ${ERROR_ROUTING_KEY_PREFIX:-}
      ENROLLMENT_URL: "http://enrollment-service:3005/enrollment"
      STUDENT_FORM_URL: "http://student-form-service:3015/student-form"
      STUDENT_SERVICE_URL: "https://personal-0wtj3pne.outsystemscloud.com/Student/rest/Student/student"
      SECTION_URL: "http://section-service:3018/section"
      FORM_LINK_URL_TEMPLATE: "http://localhost:5173/student/{student_id}/form/{form_id}"
      FORM_LINK_SUBJECT: "Action Required: Complete Your Teamder Student Form"
      FORM_LINK_GENERIC_MESSAGE: "Please complete your Teamder student form using the link provided."
      FORM_LINK_TEMPLATE_KEY: "student_form_link_v1"
      NOTIFICATION_EXCHANGE: "notification.topic"
      NOTIFICATION_EXCHANGE_TYPE: "topic"
      NOTIFICATION_ROUTING_KEY: "notification.email"
      REQUEST_TIMEOUT: 10
      PORT: 4004
    depends_on:
      - enrollment-service
      - section-service
      - student-form-service
      - rabbitmq

  swap-orchestrator-service:
    build:
      context: ./composite-services/swap-orchestrator
    container_name: teamder-swap-orchestrator-service
    ports:
      - "4005:4005"
    environment:
      ENABLE_SWAGGER: "true"
      PORT: 4005
      SUPABASE_URL: ${SUPABASE_URL}
      REQUEST_TIMEOUT: 10
      SWAP_REQUEST_URL: "http://swap-request-service:3011/swap-request"
      COURSE_SERVICE_URL: "https://personal-0wtj3pne.outsystemscloud.com/Course/rest/Course/course"
      SECTION_URL: "http://section-service:3018/section"
      TEAM_URL: "http://team-service:3007/team"
      TEAM_SWAP_EXECUTE_URL: "http://team-swap-service:3013/team-swap/execute"
      STUDENT_SERVICE_URL: "https://personal-0wtj3pne.outsystemscloud.com/Student/rest/Student/student"
      STUDENT_BULK_URL: "https://personal-0wtj3pne.outsystemscloud.com/Student/rest/Student/students/bulk-info"
    depends_on:
      - swap-request-service
      - section-service
      - team-service
      - team-swap-service

  team-swap-service:
    build:
      context: ./composite-services/team-swap
    container_name: teamder-team-swap-service
    environment:
      ENABLE_SWAGGER: "true"
      PORT: 3013
      SUPABASE_URL: ${SUPABASE_URL}
      REQUEST_TIMEOUT: 10
      TEAM_URL: "http://team-service:3007/team"
      SWAP_REQUEST_URL: "http://swap-request-service:3011/swap-request"
      FORMATION_CONFIG_URL: "http://formation-config-service:4000/formation-config"
    ports:
      - "3013:3013"
    depends_on:
      - team-service
      - swap-request-service
      - formation-config-service

  # GraphQL
  student-form-gateway-service:
    build:
      context: ./graphql/student-form-gateway
    container_name: teamder-student-form-gateway-service
    ports:
      - "4007:4007"
    environment:
      PORT: 4007
      REQUEST_TIMEOUT: 8
      ENABLE_GRAPHIQL: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      ERROR_EXCHANGE_NAME: ${ERROR_EXCHANGE_NAME:-notification.topic}
      ERROR_EXCHANGE_TYPE: ${ERROR_EXCHANGE_TYPE:-topic}
      ERROR_ROUTING_KEY_PREFIX: ${ERROR_ROUTING_KEY_PREFIX:-}
      OUTSYSTEMS_BASE_URL: "https://personal-0wtj3pne.outsystemscloud.com/Student/rest/Student"
      STUDENT_BULK_URL: "https://personal-0wtj3pne.outsystemscloud.com/Student/rest/Student/students/bulk-info"
      STUDENT_FORM_URL: "http://student-form-service:3015/student-form"
      FORMATION_CONFIG_URL: "http://formation-config-service:4000/formation-config"
      ENROLLMENT_URL: "http://enrollment-service:3005/enrollment"
      SECTION_URL: "http://section-service:3018/section"
      COURSE_URL: "https://personal-0wtj3pne.outsystemscloud.com/Course/rest/Course/course"
    depends_on:
      - student-form-service
      - formation-config-service
      - enrollment-service
      - section-service

  # Documentation
  docs-index-service:
    build:
      context: ./docs/swagger-index
    container_name: teamder-docs-index-service
    ports:
      - "4010:4010"
    environment:
      PORT: 4010

  # Kong
  kong-gateway:
    image: kong:3.8
    container_name: teamder-kong-gateway
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_PLUGINS: bundled,proxy-cache
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./kong/kong.yml:/usr/local/kong/declarative/kong.yml:ro
    ports:
      - "8000:8000"
      - "8001:8001"

  # RabbitMQ

  rabbitmq:
    image: rabbitmq:3-management
    container_name: teamder-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  rabbitmq-setup:
    image: python:3.12-slim
    container_name: teamder-rabbitmq-setup
    restart: unless-stopped
    working_dir: /app
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
    volumes:
      - ./rabbitmq:/app:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
    command: >
      sh -c "
      pip install --no-cache-dir -r /app/requirements.txt &&
      last_hash='' &&
      while true; do
        current_hash=$$(sha256sum /app/amqpsetup.py /app/requirements.txt | sha256sum | awk '{print $$1}') &&
        if [ \"$$current_hash\" != \"$$last_hash\" ]; then
          echo 'Applying RabbitMQ topology from /app/amqpsetup.py...' &&
          python /app/amqpsetup.py &&
          last_hash=\"$$current_hash\" &&
          touch /tmp/rabbitmq-setup.ready;
        fi;
        sleep 10;
      done
      "
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/rabbitmq-setup.ready"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

volumes:
  rabbitmq_data:

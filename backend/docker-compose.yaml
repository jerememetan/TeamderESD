services:

  # Atomic
  student-service:
    build:
      context: ./atomic-services/student
    container_name: teamder-student-service
    environment:
      PORT: 3001
      OUTSYSTEMS_BASE_URL: https://personal-0wtj3pne.outsystemscloud.com/Student/rest/Student
    ports:
      - "3001:3001"

  skill-service:
    build:
      context: ./atomic-services/skill
    container_name: teamder-skill-service
    environment:
      PORT: 3002
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3002:3002"

  topic-service:
    build:
      context: ./atomic-services/project-topic
    container_name: teamder-project-topic-service
    environment:
      PORT: 3003
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3003:3003"

  criteria-service:
    build:
      context: ./atomic-services/criteria
    container_name: teamder-criteria-service
    environment:
      PORT: 3004
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3004:3004"

  enrollment-service:
    build:
      context: ./atomic-services/enrollment
    container_name: teamder-enrollment-service
    environment:
      PORT: 3005
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3005:3005"

  reputation-service:
    build:
      context: ./atomic-services/reputation
    container_name: teamder-reputation-service
    environment:
      PORT: 3006
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3006:3006"
  
  team-service:
    build:
      context: ./atomic-services/team
    container_name: teamder-team-service
    environment:
      PORT: 3007
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3007:3007"

  student-competence-service:
    build: ./atomic-services/student-competence
    container_name: teamder-student-competence-service
    environment:
      PORT: 3008
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3008:3008"
  
  student-topic-preference-service:
    build: ./atomic-services/student-topic-preference
    container_name: teamder-student-topic-preference-service
    environment:
      PORT: 3009
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3009:3009"

  student-form-data-service:
    build: ./atomic-services/student-form-data
    container_name: teamder-student-form-data-service
    environment:
      PORT: 3010
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3010:3010"

  student-form-service:
    build: ./atomic-services/student-form
    container_name: teamder-student-form-service
    environment:
      PORT: 3015
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3015:3015"

  notification-service:
    build: ./atomic-services/notification
    container_name: teamder-notification-service
    environment:
      PORT: 3016
      RABBIT_HOST: rabbitmq
      RABBIT_PORT: 5672
      NOTIFICATION_EXCHANGE: notification_topic
      NOTIFICATION_EXCHANGE_TYPE: topic
      NOTIFICATION_ROUTING_KEY: FormLinkNotification
    ports:
      - "3016:3016"
    depends_on:
      - rabbitmq

  swap-request-service:
    build:
      context: ./atomic-services/swap-request
    container_name: teamder-swap-request-service
    env_file:
      - ./scenario3.env
    environment:
      PORT: 3011
    ports:
      - "3011:3011"
    depends_on:
      - rabbitmq

  swap-constraints-service:
    build:
      context: ./atomic-services/swap-constraints
    container_name: teamder-swap-constraints-service
    environment:
      PORT: 3012
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3012:3012"

  team-swap-service:
    build:
      context: ./atomic-services/team-swap
    container_name: teamder-team-swap-service
    environment:
      PORT: 3013
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3013:3013"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: teamder-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  # Composite

  formation-config-service:
    build:
      context: ./composite-services/formation-config
    container_name: teamder-formation-config-service
    ports:
      - "4000:4000"
    environment:
      CRITERIA_URL: "http://criteria-service:3004/criteria"
      TOPIC_URL: "http://topic-service:3003/topic"
      SKILL_URL: "http://skill-service:3002/skill"
    depends_on:
      - criteria-service
      - topic-service
      - skill-service

  student-profile-service:
    build:
      context: ./composite-services/student-profile
    container_name: teamder-student-profile-service
    ports:
      - "4001:4001"
    environment:
      OUTSYSTEMS_BASE_URL: "https://personal-0wtj3pne.outsystemscloud.com/Student/rest/Student"
      ENROLLMENT_URL: "http://enrollment-service:3005/enrollment"
      FORM_DATA_URL: "http://student-form-data-service:3010/form-data"
      STUDENT_FORM_SUBMISSION_URL: "http://student-form-service:3015/student-form/submission"
      REPUTATION_URL: "http://reputation-service:3006/reputation"
      TOPIC_PREFERENCE_URL: "http://student-topic-preference-service:3009/topic-preference"
      COMPETENCE_URL: "http://student-competence-service:3008/competence"
    depends_on:
      - enrollment-service
      - student-form-data-service
      - student-form-service
      - student-topic-preference-service
      - reputation-service
      - student-competence-service

  team-formation-service:
    build:
      context: ./composite-services/team-formation
    container_name: teamder-team-formation-service
    ports:
      - "4002:4002"
    environment:
      STUDENT_PROFILE_URL: "http://student-profile-service:4001/student-profile"
      FORMATION_CONFIG_URL: "http://formation-config-service:4000/formation-config"
      TEAM_URL: "http://team-service:3007/team"
      REQUEST_TIMEOUT: 8
      PORT: 4002
    depends_on:
      - student-profile-service
      - formation-config-service

      # ── Scenario 2: Dashboard Analytics ──────────────────────────────────

  analytics-service:
    build:
      context: ./atomic-services/analytics
    container_name: teamder-analytics-service
    environment:
      PORT: 3014
    ports:
      - "3014:3014"

  dashboard-orchestrator-service:
    build:
      context: ./composite-services/dashboard-orchestrator
    container_name: teamder-dashboard-orchestrator-service
    ports:
      - "4003:4003"
    environment:
      TEAM_URL: "http://team-service:3007/team"
      STUDENT_PROFILE_URL: "http://student-profile-service:4001/student-profile"
      STUDENT_FORM_SUBMISSIONS_URL: "http://student-form-service:3015/student-form/submissions"
      CRITERIA_URL: "http://criteria-service:3004/criteria"
      SKILL_URL: "http://skill-service:3002/skill"
      TOPIC_URL: "http://topic-service:3003/topic"
      ANALYTICS_URL: "http://analytics-service:3014/analytics"
      REQUEST_TIMEOUT: 8
      PORT: 4003
    depends_on:
      - team-service
      - student-profile-service
      - student-form-service
      - criteria-service
      - skill-service
      - topic-service
      - analytics-service

  formation-notification-service:
    build:
      context: ./composite-services/formation-notification
    container_name: teamder-formation-notification-service
    ports:
      - "4004:4004"
    environment:
      ENROLLMENT_URL: "http://enrollment-service:3005/enrollment"
      STUDENT_FORM_TEMPLATE_URL: "http://student-form-service:3015/student-form/template"
      STUDENT_FORM_LINK_BATCH_URL: "http://student-form-service:3015/student-form/links/batch"
      STUDENT_SERVICE_URL: "http://student-service:3001/api/students"
      NOTIFICATION_URL: "http://notification-service:3016/notification/send-form-link"
      DEFAULT_FORM_BASE_URL: "http://localhost:5173/student/fill-form"
      REQUEST_TIMEOUT: 10
      PORT: 4004
    depends_on:
      - enrollment-service
      - student-form-service
      - student-service
      - notification-service

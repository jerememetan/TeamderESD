services:

  # Atomic
  student-service:
    build:
      context: ./atomic-services/student
    container_name: teamder-student-service
    environment:
      PORT: 3001
      OUTSYSTEMS_BASE_URL: https://personal-0wtj3pne.outsystemscloud.com/Student/rest/Student
    ports:
      - "3001:3001"

  skill-service:
    build:
      context: ./atomic-services/skill
    container_name: teamder-skill-service
    environment:
      PORT: 3002
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3002:3002"

  topic-service:
    build:
      context: ./atomic-services/project-topic
    container_name: teamder-project-topic-service
    environment:
      PORT: 3003
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3003:3003"

  criteria-service:
    build:
      context: ./atomic-services/criteria
    container_name: teamder-criteria-service
    environment:
      PORT: 3004
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3004:3004"

  enrollment-service:
    build:
      context: ./atomic-services/enrollment
    container_name: teamder-enrollment-service
    environment:
      PORT: 3005
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3005:3005"

  reputation-service:
    build:
      context: ./atomic-services/reputation
    container_name: teamder-reputation-service
    environment:
      PORT: 3006
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3006:3006"
  
  team-service:
    build:
      context: ./atomic-services/team
    container_name: teamder-team-service
    environment:
      PORT: 3007
      SUPABASE_URL: ${SUPABASE_URL}
    ports:
      - "3007:3007"

  # Composite

  formation-setup-service:
    build:
      context: ./composite-services/formation-setup
    container_name: teamder-formation-setup-service
    ports:
      - "3010:3010"
    environment:
      CRITERIA_URL: "http://criteria-service:3004/criteria"
      TOPIC_URL: "http://topic-service:3003/topic"
      SKILL_URL: "http://skill-service:3002/skill"
    depends_on:
      - criteria-service
      - topic-service
      - skill-service



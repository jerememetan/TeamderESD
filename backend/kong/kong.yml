_format_version: "3.0"
_transform: true

plugins:
  - name: cors
    config:
      origins:
        - http://localhost:5173
        - http://localhost:5174
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - Origin
        - X-Requested-With
        - X-Debug-Mode
      exposed_headers:
        - Content-Type
        - Content-Length
      credentials: true
      max_age: 3600

services:
  - name: student-service
    url: https://personal-0wtj3pne.outsystemscloud.com/Student/rest/Student/student
    routes:
      - name: student-service-route
        paths:
          - /students
        strip_path: true
        plugins:
          - name: proxy-cache
            config:
              cache_ttl: 300
              strategy: memory
              request_method:
                - GET

  - name: course-service
    url: https://personal-0wtj3pne.outsystemscloud.com/Course/rest/Course/course
    routes:
      - name: course-service-route
        paths:
